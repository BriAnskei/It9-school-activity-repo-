<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level 6 - Door Challenge</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: powderblue;
      }
      .card {
        border-radius: 25px;
      }
      .door-btn {
        width: 30%;
      }
      #resultMessage {
        margin-top: 15px;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="d-flex justify-content-center">
      <div class="card mt-5 w-75 shadow-lg p-3 text-center">
        <span class="badge rounded-pill text-bg-primary">Level 6</span>
        <h5 class="card-title">Door Challenge Quest</h5>
        <p>Pick the correct door!</p>
        <div class="d-flex justify-content-evenly mt-3">
          <button class="btn btn-primary door-btn" id="door1">Door 1</button>
          <button class="btn btn-primary door-btn" id="door2">Door 2</button>
          <button class="btn btn-primary door-btn" id="door3">Door 3</button>
        </div>
        <div id="resultMessage"></div>
        <button
          class="btn btn-warning mt-3"
          onclick="location.href = 'level1.html'"
        >
          Restart
        </button>
      </div>
    </div>
    <script src="level6Script.js"></script>
  </body>
</html>
