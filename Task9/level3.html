<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <style>
      body {
        background-color: powderblue;
      }

      .card {
        border-radius: 25px;
      }
    </style>
  </head>
  <body>
    <div class="d-flex justify-content-center">
      <div class="card mt-5 w-50 shadow-lg" style="height: 150px">
        <div class="card-body">
          <div class="d-flex align-items-center gap-2">
            <span id="levelBadge" class="badge rounded-pill text-bg-primary">
              Level 3
            </span>

            <button
              id="levelUpBtn"
              type="button"
              class="btn btn-success btn-sm"
            >
              Level up!
            </button>
          </div>

          <h5 class="card-title">Web Dev Mini-quest</h5>
          This is the Level 3, keep it up!
          <div class="d-flex justify-content-evenly gap-3">
            <button
              type="button"
              class="btn btn-secondary w-50"
              onclick="location.href = 'level2.html'"
            >
              Prev
            </button>
            <button
              type="button"
              class="btn btn-dark w-50"
              onclick="location.href = 'level4.html'"
            >
              Next
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
