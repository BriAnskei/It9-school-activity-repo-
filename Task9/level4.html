<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Level 4 - Form Validation</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: powderblue;
      }

      .card {
        border-radius: 25px;
      }
    </style>
  </head>

  <body>
    <div class="d-flex justify-content-center">
      <div class="card mt-5 w-50 shadow-lg p-3">
        <span class="badge rounded-pill text-bg-primary"> Level 4 </span>
        <h5 class="card-title">Form Validation Quest</h5>

        <input
          type="text"
          id="nameInput"
          class="form-control mb-2"
          placeholder="Enter your name"
        />

        <button id="submitBtn" class="btn btn-success mb-2">Submit</button>

        <div id="message"></div>

        <div class="d-flex justify-content-evenly gap-3 mt-3">
          <button
            class="btn btn-secondary w-50"
            onclick="location.href = 'level3.html'"
          >
            Back
          </button>

          <button
            class="btn btn-dark w-50"
            onclick="location.href = 'level5.html'"
          >
            Next
          </button>
        </div>
      </div>
    </div>

    <script src="level4Script.js"></script>
  </body>
</html>
